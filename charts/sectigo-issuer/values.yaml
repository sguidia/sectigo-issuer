# Default values for sectigo-issuer

replicaCount: 1

image:
  repository: ghcr.io/sguidia/sectigo-issuer
  tag: ""  # Defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Whether to create a ServiceAccount
  create: true
  # Annotations to add to the ServiceAccount
  annotations: {}
  # Name override; defaults to fullname
  name: ""

# Controller manager arguments
args:
  leaderElect: true
  healthProbeBindAddress: ":8081"
  metricsBindAddress: "0"

# Pod security context (applied to the pod)
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

# Additional pod annotations
podAnnotations: {}

# Additional pod labels
podLabels: {}

# Install CRDs with the chart
installCRDs: true
