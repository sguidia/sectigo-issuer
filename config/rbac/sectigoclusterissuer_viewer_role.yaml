# This rule is not used by the project sectigo-issuer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to sectigo.opensource.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: sectigo-issuer
    app.kubernetes.io/managed-by: kustomize
  name: sectigoclusterissuer-viewer-role
rules:
- apiGroups:
  - sectigo.opensource.io
  resources:
  - sectigoclusterissuers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sectigo.opensource.io
  resources:
  - sectigoclusterissuers/status
  verbs:
  - get
