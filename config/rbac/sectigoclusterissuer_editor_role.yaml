# This rule is not used by the project sectigo-issuer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the sectigo.opensource.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: sectigo-issuer
    app.kubernetes.io/managed-by: kustomize
  name: sectigoclusterissuer-editor-role
rules:
- apiGroups:
  - sectigo.opensource.io
  resources:
  - sectigoclusterissuers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sectigo.opensource.io
  resources:
  - sectigoclusterissuers/status
  verbs:
  - get
